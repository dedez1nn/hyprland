$Scripts = $HOME/.config/hypr/scripts

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

background {
    monitor =
    path = HOME_PLACEHOLDER/Imagens/wallpapers/fundo3.jpg
    color = rgb(0, 0, 0)
    blur_size = 5
    blur_passes = 3
    brightness = 0.70
    contrast = 1.0
    vibrancy = 0.10
    vibrancy_darkness = 0.0
}

# ---- COLUNA CENTRAL (todos ancorados em valign = center) ----
# Positivo Y = sobe, negativo Y = desce

# Hora
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 0.95)
    font_size = 96
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 140
    halign = center
    valign = center
}

# Data
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %-d de %B')"
    color = rgba(255, 255, 255, 0.60)
    font_size = 22
    font_family = Cantarell
    position = 0, 55
    halign = center
    valign = center
}

# Usuário
label {
    monitor =
    text =   $USER
    color = rgba(255, 255, 255, 0.75)
    font_size = 18
    font_family = Cantarell
    position = 0, -20
    halign = center
    valign = center
}

# Campo de senha
input-field {
    monitor =
    size = 280, 58
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.25
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.30)
    inner_color = rgba(255, 255, 255, 0.08)
    font_color = rgba(255, 255, 255, 0.90)
    check_color = rgba(255, 255, 255, 0.90)
    fail_color = rgba(255, 100, 100, 0.80)
    capslock_color = rgba(255, 200, 60, 0.90)
    fade_on_empty = false
    font_family = Cantarell
    placeholder_text = <span foreground="##ffffff60"> Senha</span>
    hide_input = false
    rounding = 12
    position = 0, -105
    halign = center
    valign = center
}

# ---- CANTOS ----

# Bateria — inferior direito
label {
    monitor =
    text = cmd[update:5000] echo "$($Scripts/Battery.sh)"
    color = rgba(255, 255, 255, 0.50)
    font_size = 14
    font_family = Cantarell
    position = -24, 24
    halign = right
    valign = bottom
}

# Clima — inferior esquerdo
label {
    monitor =
    text = cmd[update:3600000] [ -f "$HOME/.cache/.weather_cache" ] && cat "$HOME/.cache/.weather_cache"
    color = rgba(255, 255, 255, 0.50)
    font_size = 14
    font_family = Cantarell
    position = 24, 24
    halign = left
    valign = bottom
}
